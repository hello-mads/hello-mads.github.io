  description: |
    인프라 리소스를 무제한으로 투입해 문제를 해결하는 것은 누구나 할 수 있습니다.
    하지만 **한정된 자원 안에서 높은 트래픽을 견뎌내는 설계**는 치열하게 고민하는 엔지니어만이 경험할 수 있는 영역입니다.
    
    우리 스터디는 단순히 기능을 구현하는 것을 넘어, 정교한 메트릭과 지표를 통해 저비용 인프라에서도 최대 효율을 끌어내는 방법을 함께 고민합니다.
    
    하지만 효율적인 시스템을 만든다고 해서 모든 문제가 해결되지는 않습니다.
    운영 환경에서는 장애를 피하고 싶어도 결코 피할 수 없기 때문입니다.
    
    그래서 **좋은 시스템은 장애가 발생하지 않는 시스템이 아니라, 장애가 발생했을 때 스스로를 지키고 빠르게 회복할 수 있는 시스템**입니다.
    
    우리는 대개 통제된 개발 환경에서 작업하며, 테스트를 통과했다는 사실만으로 안정성을 보장받는 듯한 착각에 빠지곤 합니다.
    하지만 실제 운영 환경은 우리가 마주하는 테스트 코드보다 훨씬 냉혹합니다.
    
    - 예측할 수 없는 사용자 입력
    - 비정상적인 요청 흐름과 악의적인 공격
    - 미묘한 타이밍에 발생하는 동시성 충돌
    - 언제든 끊길 수 있는 네트워크 불안정
    - 갑작스럽게 몰아치는 트래픽 폭증
    
    QA를 통과했다는 사실이 시스템의 영원한 생존을 보장해주지는 않습니다.
    결국 우리는 스스로에게 본질적인 질문을 던져야 합니다.
    
    > "버그가 발생하는가?"가 아니라, **"장애가 발생했을 때 우리는 무엇을 할 수 있는가?"**
    
    - 어디서부터 원인을 좁혀갈 것인가?
    - 장애의 반경은 어디까지 전파되는가?
    - 시스템은 스스로를 보호하도록 설계되어 있는가?
    - 같은 장애가 반복될 때 더 빠르게 복구할 수 있는가?
    
    이 스터디에서는 **효율적인 시스템 설계**와 **운영 환경에서의 복원력(Resilience)**을 핵심 주제로 다룹니다.
    메트릭을 통해 시스템을 깊이 이해하고, 장애 상황에서도 무너지지 않는 견고한 구조를 함께 탐구하는 것이 우리의 목표입니다.
    
    ---
    
    ## 👤 이런 분과 함께하고 싶습니다
    
    - **백엔드 경력 3~7년차**로 실무 역량을 한 단계 높이고 싶은 분
    - 운영 환경에서 장애를 직접 대응하며 '시스템 생존'의 중요성을 체감하신 분
    - 단순 구현을 넘어, 시스템이 무너지는 원리와 방어 기제에 관심이 있는 분
    - 장애를 두려워하기보다, 구조적 관점에서 분석하고 개선하고 싶은 분
    
    완벽한 코드를 만드는 것이 전부는 아닙니다.
    현실의 제약 속에서 **끝까지 버틸 수 있는 시스템을 설계하는 법**을 함께 고민해 봅시다.
